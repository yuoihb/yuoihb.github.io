      }

      }
     .s>li:hover>.i{

       }
      .s>li>.i>li{%

        }
      a{font-family:宋体;font-size:13px;color:#b7b0a3;}

<script src="https://eqcn.ajz.miesnfu.com/wp-content/plugins/wp-3d-pony/live2dw/lib/L2Dwidget.min.js"></script>
<script>
    L2Dwidget.init({
        "model": {
            jsonPath: "https://unpkg.com/live2d-widget-model-shizuku/assets/shizuku.model.json",//这里改模型，前面后面都要改
            "scale": 1
        },
        "display": {
            "position": "left",//设置看板娘的上下左右位置
            "width":80,
            "height":120,
            "hOffset": 70,
            "vOffset":0
        },
        "mobile": {
            "show": true,
            "scale": 0.5
        },
        "react": {
            "opacityDefault": 0.8,//设置透明度
            "opacityOnHover": 0.2
        }
    });
    window.onload = function () {
        $("#live2dcanvas").attr("style", "position: fixed; opacity: 0.7; left: 0px; bottom: 10px; z-index:2; pointer-events:none;")
    }
</script>
